<!DOCTYPE html>
<html lang="zh-CN">
<head>
   <meta charset="UTF-8">
   <title>WebSocket 测试</title>
</head>
<body>
   <h1>WebSocket Demo</h1>
   <button id="sendBtn">发送消息</button>
   <div id="response"></div>
   <script>
       // 建立连接
       const socket = new WebSocket('ws://localhost:1145');
       socket.onopen = () => {
           console.log('已连接到服务器');
           socket.send('Hello Server!');
       };
       socket.onmessage = (event) => {
           document.getElementById('response').textContent = '服务器: ' + event.data;
       };
       socket.onerror = (error) => {
           console.error('WebSocket 错误:', error);
       };
       socket.onclose = () => {
           console.log('连接已关闭');
       };
       document.getElementById('sendBtn').onclick = () => {
           socket.send('客户端发送消息');
       };
   </script>
</body>
</html>
